<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | S.M Eatery and Snack House</title>

    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/menu.css">
</head>
<body>

<header>
    <nav class="navbar">
        <div class="logo">
            <img src="image/logo.png" alt="Logo">
            <span>S.M Eatery</span>
        </div>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="menu.html" class="active">Menu</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>

        <div class="menu-toggle">☰</div>
    </nav>
</header>

<section class="menu-header">
    <h1>Our Menu</h1>
    <p>Freshly prepared meals, snacks, and drinks.</p>

    <input type="text" placeholder="Search food..." id="searchFood">
</section>

<section class="menu-grid">

    <div class="menu-card" onclick="orderFood('Papaitan')">
    <img src="image/foods/papaitan.jpeg" alt="Papaitan">
    <span class="badge">Best Seller</span>
    <h3>Papaitan</h3>
    <p>₱60</p>
</div>

    <div class="menu-card" onclick="orderFood('Dinakdakan')">
    <img src="image/foods/dinakdakan.jpeg" alt="Dinakdakan">
    <span class="badge">New</span>
    <h3>Dinakdakan</h3>
    <p>₱60</p>
</div>

    <div class="menu-card" onclick="orderFood('Dinuguan')">
    <img src="image/foods/dinuguan.jpeg" alt="Dinuguan">
    <h3>Dinuguan</h3>
    <p>₱60</p>
</div>

    <div class="menu-card" onclick="orderFood('Gulay')">
    <img src="image/foods/pinakbet.jpg" alt="Gulay">
    <h3>Gulay</h3>
    <p>₱25</p>
</div>

    <div class="menu-card" onclick="orderFood('Inihaw na Bangus')">
    <img src="image/foods/inihaw_bangus.jpeg" alt="Inihaw na Bangus">
    <h3>Inihaw na Bangus</h3>
    <p>₱230 Medium Size</p>
    </div>

    <div class="menu-card" onclick="orderFood('Inihaw na Tilapia')">
    <img src="image/foods/inihaw_tilapia.jpeg" alt="Inihaw na Tilapia">
    <h3>Inihaw na Tilapia</h3>
    <p>₱100 To 150</p>
</div>

</section>

<footer>
    <p>&copy; 2026 S.M Eatery and Snack House</p>
</footer>

<script src="js/navbar.js"></script>
<script src="js/menu.js"></script>

</body>
</html>
